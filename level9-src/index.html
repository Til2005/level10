
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KI für DICH!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      /* Deep Midnight Blue #151037 */
      background-color: #151037;
      background-image: radial-gradient(circle at 30% 20%, #1e1a4d 0%, #151037 100%);
      min-height: 100vh;
      color: #f8fafc;
      margin: 0;
    }
    h1, h2, h3 {
      font-family: 'Fredoka', sans-serif;
    }
    .card-bounce {
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .card-bounce:hover {
      transform: scale(1.02);
    }
    .progress-bar {
      transition: width 0.5s ease-in-out;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    .floating-emoji {
      animation: float 3s ease-in-out infinite;
    }
    @keyframes slideInFromTop {
      0% {
        opacity: 0;
        transform: translateY(-30px) scale(0.8);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    @keyframes glow {
      0%, 100% {
        box-shadow: 0 0 20px rgba(250, 204, 21, 0.4), 0 0 40px rgba(251, 191, 36, 0.2);
      }
      50% {
        box-shadow: 0 0 30px rgba(250, 204, 21, 0.6), 0 0 60px rgba(251, 191, 36, 0.3);
      }
    }
    .points-badge {
      animation: slideInFromTop 0.7s ease-out 0.3s both, glow 2s ease-in-out infinite;
    }

    /* Hide Scrollbar */
    ::-webkit-scrollbar {
      display: none;
    }

    /* Firefox */
    * {
      scrollbar-width: none;
    }

    /* IE and Edge */
    * {
      -ms-overflow-style: none;
    }

    /* Tahoe Liquid Glass Effect */
    .glass-card {
      background: rgba(255, 255, 255, 0.07) !important;
      backdrop-filter: blur(30px) saturate(100%) !important;
      -webkit-backdrop-filter: blur(30px) saturate(100%) !important;
      border: 0.5px solid rgba(255, 255, 255, 0.125) !important;
      box-shadow:
        0 8px 32px 0 rgba(0, 0, 0, 0.3),
        inset 0 0 0 0.5px rgba(255, 255, 255, 0.08),
        inset 0 1px 0 0 rgba(255, 255, 255, 0.1) !important;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      border-radius: inherit;
      opacity: 0.5;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
