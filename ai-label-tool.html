<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Label Tool - Til Sander</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #ffffff;
            margin-bottom: 12px;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: 400;
        }

        .developer {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .upload-box {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.02);
            position: relative;
        }

        .upload-box::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .upload-box:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .upload-box:hover::before {
            opacity: 1;
        }

        .upload-box.dragover {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.01);
        }

        .upload-box h3 {
            color: #ffffff;
            margin-bottom: 12px;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .upload-box p {
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .upload-box input {
            display: none;
        }

        .upload-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .upload-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        .label-preview {
            margin-top: 15px;
            display: none;
        }

        .label-preview img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            padding: 8px;
        }

        .settings {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .settings h3 {
            color: #ffffff;
            margin-bottom: 25px;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .setting-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .setting-row label {
            color: rgba(255, 255, 255, 0.7);
            min-width: 140px;
            font-weight: 500;
        }

        .setting-row input[type="range"] {
            flex: 1;
            max-width: 350px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        .setting-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #ffffff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .setting-row input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: #ffffff;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .setting-row input[type="number"] {
            width: 70px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            font-size: 0.95rem;
            color: #ffffff;
            text-align: center;
        }

        .setting-row input[type="number"]:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .setting-row span {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .preview-item {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s ease;
        }

        .preview-item:hover {
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-2px);
        }

        .preview-item canvas {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: move;
        }

        .preview-item canvas:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .preview-item .filename {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 8px;
        }

        .download-single-btn {
            width: 100%;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .download-single-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.2px;
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.95);
            color: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-primary:hover {
            background: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 255, 255, 0.15);
        }

        .btn-primary:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
            background: rgba(255, 255, 255, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .status {
            text-align: center;
            margin-top: 25px;
            padding: 16px 24px;
            border-radius: 12px;
            display: none;
            font-size: 0.95rem;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        .status.success {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .status.error {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .status.info {
            background: rgba(59, 130, 246, 0.15);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            header h1 {
                font-size: 2rem;
            }

            .upload-section {
                grid-template-columns: 1fr;
            }

            .setting-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .setting-row input[type="range"] {
                width: 100%;
                max-width: 100%;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Label Tool</h1>
            <p class="subtitle">Label unten rechts auf deine Bilder packen</p>
            <p class="developer">Entwickelt von Til Sander</p>
        </header>

        <div class="upload-section">
            <!-- AI Label Upload -->
            <div class="upload-box" id="labelUploadBox">
                <h3>AI Label hochladen</h3>
                <p>PNG mit transparentem Hintergrund</p>
                <input type="file" id="labelInput" accept="image/png">
                <button class="upload-btn" onclick="document.getElementById('labelInput').click()">
                    Label auswählen
                </button>
                <div class="label-preview" id="labelPreview">
                    <img id="labelPreviewImg" src="" alt="Label Preview">
                </div>
            </div>

            <!-- Images Upload -->
            <div class="upload-box" id="imagesUploadBox">
                <h3>Bilder hochladen</h3>
                <p>PNG/JPG-Dateien (Mehrfachauswahl möglich)</p>
                <input type="file" id="imagesInput" accept="image/png,image/jpeg,image/jpg" multiple>
                <button class="upload-btn" onclick="document.getElementById('imagesInput').click()">
                    Bilder auswählen
                </button>
                <p id="imageCount" style="margin-top: 15px; color: rgba(255, 255, 255, 0.7); font-weight: 500;"></p>
            </div>
        </div>

        <!-- Settings -->
        <div class="settings">
            <h3>Einstellungen</h3>
            <div class="setting-row">
                <label>Label-Größe:</label>
                <input type="range" id="labelSize" min="5" max="50" value="15" step="1">
                <input type="number" id="labelSizeValue" min="5" max="50" value="15">
                <span>% der Bildbreite</span>
            </div>
            <div class="setting-row">
                <label>Abstand rechts:</label>
                <input type="range" id="paddingRight" min="0" max="2000" value="10" step="1">
                <input type="number" id="paddingRightValue" min="0" max="2000" value="10">
                <span>px</span>
            </div>
            <div class="setting-row">
                <label>Abstand unten:</label>
                <input type="range" id="paddingBottom" min="0" max="2000" value="10" step="1">
                <input type="number" id="paddingBottomValue" min="0" max="2000" value="10">
                <span>px</span>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn btn-primary" id="downloadBtn" onclick="downloadAll()" disabled>
                Alle herunterladen
            </button>
            <button class="btn btn-secondary" onclick="reset()">
                Zurücksetzen
            </button>
        </div>

        <!-- Preview Grid -->
        <div id="previewContainer" style="display: none;">
            <h3 style="margin-bottom: 20px; color: #ffffff; font-size: 1.3rem; font-weight: 600;">Vorschau</h3>
            <div class="preview-grid" id="previewGrid"></div>
        </div>

        <!-- Status Messages -->
        <div class="status" id="statusMsg"></div>
    </div>

    <script>
        let labelImage = null;
        let labelImageSrc = null; // Store the data URL for the label
        let sourceImages = [];
        let processedCanvases = [];
        let labelPositions = []; // Store custom positions for each image

        // Drag & Drop Support
        ['labelUploadBox', 'imagesUploadBox'].forEach(boxId => {
            const box = document.getElementById(boxId);

            box.addEventListener('dragover', (e) => {
                e.preventDefault();
                box.classList.add('dragover');
            });

            box.addEventListener('dragleave', () => {
                box.classList.remove('dragover');
            });

            box.addEventListener('drop', (e) => {
                e.preventDefault();
                box.classList.remove('dragover');

                const files = e.dataTransfer.files;
                if (boxId === 'labelUploadBox' && files.length > 0) {
                    handleLabelUpload(files[0]);
                } else if (boxId === 'imagesUploadBox') {
                    handleImagesUpload(files);
                }
            });
        });

        // Label Upload
        document.getElementById('labelInput').addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleLabelUpload(e.target.files[0]);
            }
        });

        function handleLabelUpload(file) {
            if (!file.type.match('image/png')) {
                showStatus('Bitte nur PNG-Dateien hochladen!', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    labelImage = img;
                    labelImageSrc = e.target.result; // Store the data URL
                    document.getElementById('labelPreviewImg').src = e.target.result;
                    document.getElementById('labelPreview').style.display = 'block';
                    showStatus('AI Label erfolgreich geladen', 'success');
                    autoGeneratePreview();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Images Upload
        document.getElementById('imagesInput').addEventListener('change', (e) => {
            handleImagesUpload(e.target.files);
        });

        function handleImagesUpload(files) {
            const imageFiles = Array.from(files).filter(f => f.type.match('image/(png|jpeg|jpg)'));

            if (imageFiles.length === 0) {
                showStatus('Keine Bilddateien gefunden!', 'error');
                return;
            }

            sourceImages = [];
            let loaded = 0;

            imageFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        // Detect if original was JPG/JPEG
                        const isJpeg = file.type === 'image/jpeg' || file.name.toLowerCase().endsWith('.jpg') || file.name.toLowerCase().endsWith('.jpeg');

                        sourceImages.push({
                            name: file.name,
                            image: img,
                            isJpeg: isJpeg
                        });
                        loaded++;

                        if (loaded === imageFiles.length) {
                            document.getElementById('imageCount').textContent =
                                `${sourceImages.length} Bild${sourceImages.length > 1 ? 'er' : ''} geladen`;
                            showStatus(`${sourceImages.length} Bild(er) erfolgreich geladen`, 'success');
                            autoGeneratePreview();
                        }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // Settings - Sync sliders with number inputs
        let isUpdatingFromSlider = false;

        ['labelSize', 'paddingRight', 'paddingBottom'].forEach(id => {
            const slider = document.getElementById(id);
            const numberInput = document.getElementById(id + 'Value');

            slider.addEventListener('input', () => {
                numberInput.value = slider.value;
                if (labelImage && sourceImages.length > 0) {
                    isUpdatingFromSlider = true;
                    updateAllLabelsFromSettings();
                    isUpdatingFromSlider = false;
                }
            });

            numberInput.addEventListener('input', () => {
                slider.value = numberInput.value;
                if (labelImage && sourceImages.length > 0) {
                    isUpdatingFromSlider = true;
                    updateAllLabelsFromSettings();
                    isUpdatingFromSlider = false;
                }
            });
        });

        function updateSliderValues(imageWidth, imageHeight, labelX, labelY, labelWidth, labelHeight) {
            if (isUpdatingFromSlider) return; // Prevent circular updates

            // Calculate distances from edges
            const paddingRight = Math.round(imageWidth - labelX - labelWidth);
            const paddingBottom = Math.round(imageHeight - labelY - labelHeight);

            // Update sliders
            document.getElementById('paddingRight').value = paddingRight;
            document.getElementById('paddingRightValue').value = paddingRight;
            document.getElementById('paddingBottom').value = paddingBottom;
            document.getElementById('paddingBottomValue').value = paddingBottom;
        }

        function updateAllLabelsFromSettings() {
            // Update all label positions based on current slider values
            const labelSizePercent = parseInt(document.getElementById('labelSize').value);
            const paddingRight = parseInt(document.getElementById('paddingRight').value);
            const paddingBottom = parseInt(document.getElementById('paddingBottom').value);

            sourceImages.forEach((src, index) => {
                const labelWidth = (src.image.width * labelSizePercent) / 100;
                const labelHeight = (labelImage.height / labelImage.width) * labelWidth;
                const newX = src.image.width - labelWidth - paddingRight;
                const newY = src.image.height - labelHeight - paddingBottom;

                labelPositions[index].x = newX;
                labelPositions[index].y = newY;
                labelPositions[index].width = labelWidth;
                labelPositions[index].height = labelHeight;
            });

            // Redraw all canvases
            redrawAllCanvases();
        }

        let allCanvases = [];

        function redrawAllCanvases() {
            allCanvases.forEach((canvasInfo, index) => {
                const ctx = canvasInfo.canvas.getContext('2d');
                ctx.clearRect(0, 0, canvasInfo.canvas.width, canvasInfo.canvas.height);
                ctx.drawImage(canvasInfo.sourceImage, 0, 0);

                const pos = labelPositions[index];
                ctx.drawImage(labelImage, pos.x, pos.y, pos.width, pos.height);
            });
        }

        function autoGeneratePreview() {
            // Automatically generate preview when both label and images are loaded
            if (labelImage && sourceImages.length > 0) {
                generatePreviews();
            }
        }

        function generatePreviews() {
            if (!labelImage || sourceImages.length === 0) {
                showStatus('Bitte Label und Bilder hochladen!', 'error');
                return;
            }

            processedCanvases = [];
            labelPositions = [];
            allCanvases = [];
            const previewGrid = document.getElementById('previewGrid');
            previewGrid.innerHTML = '';

            const labelSizePercent = parseInt(document.getElementById('labelSize').value);
            const paddingRight = parseInt(document.getElementById('paddingRight').value);
            const paddingBottom = parseInt(document.getElementById('paddingBottom').value);

            sourceImages.forEach((src, index) => {
                // Calculate default label size and position
                const labelWidth = (src.image.width * labelSizePercent) / 100;
                const labelHeight = (labelImage.height / labelImage.width) * labelWidth;
                const defaultX = src.image.width - labelWidth - paddingRight;
                const defaultY = src.image.height - labelHeight - paddingBottom;

                // Store default position
                labelPositions[index] = { x: defaultX, y: defaultY, width: labelWidth, height: labelHeight };

                // Create preview item
                const previewItem = document.createElement('div');
                previewItem.className = 'preview-item';

                // Create canvas
                const canvas = document.createElement('canvas');
                canvas.width = src.image.width;
                canvas.height = src.image.height;

                // Store canvas reference
                allCanvases.push({
                    canvas: canvas,
                    sourceImage: src.image
                });

                // Draw function
                function drawCanvas() {
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    // Draw source image
                    ctx.drawImage(src.image, 0, 0);

                    // Draw label
                    const pos = labelPositions[index];
                    ctx.drawImage(labelImage, pos.x, pos.y, pos.width, pos.height);
                }

                drawCanvas();

                // Drag functionality
                let isDragging = false;
                let offsetX, offsetY;

                canvas.addEventListener('mousedown', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;

                    const mouseX = (e.clientX - rect.left) * scaleX;
                    const mouseY = (e.clientY - rect.top) * scaleY;

                    const pos = labelPositions[index];

                    // Check if click is inside label
                    if (mouseX >= pos.x && mouseX <= pos.x + pos.width &&
                        mouseY >= pos.y && mouseY <= pos.y + pos.height) {
                        isDragging = true;
                        offsetX = mouseX - pos.x;
                        offsetY = mouseY - pos.y;
                        e.preventDefault();
                    }
                });

                canvas.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;

                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;

                    let newX = (e.clientX - rect.left) * scaleX - offsetX;
                    let newY = (e.clientY - rect.top) * scaleY - offsetY;

                    // Constrain to canvas bounds
                    newX = Math.max(0, Math.min(canvas.width - labelPositions[index].width, newX));
                    newY = Math.max(0, Math.min(canvas.height - labelPositions[index].height, newY));

                    labelPositions[index].x = newX;
                    labelPositions[index].y = newY;
                    drawCanvas();

                    // Update sliders live
                    updateSliderValues(
                        canvas.width,
                        canvas.height,
                        labelPositions[index].x,
                        labelPositions[index].y,
                        labelPositions[index].width,
                        labelPositions[index].height
                    );
                });

                canvas.addEventListener('mouseup', () => {
                    isDragging = false;
                });

                canvas.addEventListener('mouseleave', () => {
                    isDragging = false;
                });

                const filename = document.createElement('div');
                filename.className = 'filename';
                filename.textContent = src.name;

                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'download-single-btn';
                downloadBtn.textContent = 'Download';
                downloadBtn.onclick = function() {
                    downloadSingleWithPosition(index);
                };

                previewItem.appendChild(canvas);
                previewItem.appendChild(filename);
                previewItem.appendChild(downloadBtn);
                previewGrid.appendChild(previewItem);

                // Store canvas info
                processedCanvases.push({
                    sourceImage: src.image,
                    name: src.name,
                    isJpeg: src.isJpeg,
                    index: index
                });
            });

            document.getElementById('previewContainer').style.display = 'block';
            document.getElementById('downloadBtn').disabled = false;
            showStatus(`${processedCanvases.length} Vorschau(en) erstellt - Label verschiebbar!`, 'success');
        }

        function downloadSingleWithPosition(index) {
            const item = processedCanvases[index];
            const pos = labelPositions[index];

            // Create final canvas with label at custom position
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = item.sourceImage.width;
            canvas.height = item.sourceImage.height;

            // Draw source image
            ctx.drawImage(item.sourceImage, 0, 0);

            // Draw label at custom position
            ctx.drawImage(labelImage, pos.x, pos.y, pos.width, pos.height);

            // Download
            const mimeType = item.isJpeg ? 'image/jpeg' : 'image/png';
            const quality = item.isJpeg ? 0.95 : undefined;

            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;

                let newName;
                if (item.isJpeg) {
                    newName = item.name.replace(/\.(jpg|jpeg)$/i, '_labeled.jpg');
                } else {
                    newName = item.name.replace(/\.png$/i, '_labeled.png');
                }
                a.download = newName;

                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, mimeType, quality);
        }

        async function downloadAll() {
            if (processedCanvases.length === 0) {
                showStatus('Keine verarbeiteten Bilder vorhanden', 'error');
                return;
            }

            showStatus('Starte Downloads...', 'info');

            // Download each image individually with a small delay
            for (let i = 0; i < processedCanvases.length; i++) {
                setTimeout(() => {
                    downloadSingleWithPosition(i);
                }, i * 300); // 300ms delay between downloads
            }

            setTimeout(() => {
                showStatus(`${processedCanvases.length} Download(s) gestartet`, 'success');
            }, processedCanvases.length * 300);
        }

        function reset() {
            labelImage = null;
            labelImageSrc = null;
            sourceImages = [];
            processedCanvases = [];
            labelPositions = [];
            allCanvases = [];

            document.getElementById('labelInput').value = '';
            document.getElementById('imagesInput').value = '';
            document.getElementById('labelPreview').style.display = 'none';
            document.getElementById('imageCount').textContent = '';
            document.getElementById('previewContainer').style.display = 'none';
            document.getElementById('previewGrid').innerHTML = '';
            document.getElementById('downloadBtn').disabled = true;

            showStatus('Zurückgesetzt', 'info');
        }

        function showStatus(message, type) {
            const status = document.getElementById('statusMsg');
            status.textContent = message;
            status.className = 'status ' + type;
            status.style.display = 'block';

            setTimeout(() => {
                status.style.display = 'none';
            }, 4000);
        }
    </script>
</body>
</html>
